# nginx proxy address - http://172.17.0.1:8104

name: picoshare
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  picoshare:
    image: picoshare/picoshare:latest
    pull_policy: always
    container_name: picoshare-app
    restart: always
    logging: *default-logging
    networks:
      - picoshare
    ports:
      - "172.17.0.1:8104:8080"
    environment:
      TZ: ${TZ:-America/New_York}
      PORT: 8080
      PS_SHARED_SECRET: ${APP_SHARED_SECRET:-changeme_shared_secret}
    volumes:
      - ./volumes/config/picoshare:/config
      - ./volumes/data/picoshare:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8104"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  picoshare:
    name: picoshare
    external: false
